<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂互动系统 - 登录/注册</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header i {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .login-body {
            padding: 30px;
        }

        /* 身份选择 */
        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .role-option {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .role-option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .role-option.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .role-option i {
            font-size: 24px;
            margin-bottom: 8px;
            display: block;
        }

        .role-option span {
            font-size: 14px;
            font-weight: 500;
        }

        /* 标签切换 */
        .tab-switcher {
            display: flex;
            gap: 0;
            margin-bottom: 25px;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #666;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        /* 表单 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-input::placeholder {
            color: #aaa;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .input-with-icon .form-input {
            padding-left: 45px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* 注册表单额外字段 */
        .register-only {
            display: none;
        }

        .register-only.show {
            display: block;
        }

        .form-hint {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-container {
                border-radius: 0;
                min-height: 100vh;
            }

            .login-header {
                padding: 30px 20px;
            }

            .login-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-graduation-cap"></i>
            <h1>课堂互动系统</h1>
            <p>智能教学辅助平台</p>
        </div>

        <div class="login-body">
            <!-- 身份选择 -->
            <div class="role-selector">
                <div class="role-option active" data-role="teacher" onclick="selectRole('teacher')">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <span>教师</span>
                </div>
                <div class="role-option" data-role="student" onclick="selectRole('student')">
                    <i class="fas fa-user-graduate"></i>
                    <span>学生</span>
                </div>
            </div>

            <!-- 标签切换 -->
            <div class="tab-switcher">
                <button class="tab-btn active" onclick="switchTab('login')">登录</button>
                <button class="tab-btn" onclick="switchTab('register')">注册</button>
            </div>

            <!-- 错误/成功提示 -->
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <!-- 登录表单 -->
            <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
                <div class="form-group">
                    <label class="form-label">账号</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" class="form-input" id="loginAccount" placeholder="请输入账号" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </form>

            <!-- 注册表单 -->
            <form id="registerForm" onsubmit="handleRegister(event)" style="display: none;" novalidate>
                <div class="form-group">
                    <label class="form-label">账号</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" class="form-input" id="registerAccount" placeholder="请输入账号" required>
                    </div>
                    <div class="form-hint" id="teacherHint">教师账号：6-20位字母或数字</div>
                    <div class="form-hint" id="studentHint" style="display: none;">学号格式：202235150101（12位数字）</div>
                </div>

                <div class="form-group" id="nameGroup">
                    <label class="form-label">姓名</label>
                    <div class="input-with-icon">
                        <i class="fas fa-id-card"></i>
                        <input type="text" class="form-input" id="registerName" placeholder="请输入真实姓名" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-input" id="registerPassword" placeholder="请输入密码（至少6位）" required minlength="6">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-input" id="registerConfirmPassword" placeholder="请再次输入密码" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="registerBtn">
                    <i class="fas fa-user-plus"></i> 注册
                </button>
            </form>
        </div>
    </div>

    <script>
        // 当前选中的身份和标签
        let currentRole = 'teacher';
        let currentTab = 'login';

        // 选择身份
        function selectRole(role) {
            currentRole = role;
            document.querySelectorAll('.role-option').forEach(option => {
                option.classList.remove('active');
            });
            document.querySelector(`[data-role="${role}"]`).classList.add('active');

            // 更新注册表单的提示
            if (role === 'teacher') {
                document.getElementById('teacherHint').style.display = 'block';
                document.getElementById('studentHint').style.display = 'none';
            } else {
                document.getElementById('teacherHint').style.display = 'none';
                document.getElementById('studentHint').style.display = 'block';
            }
        }

        // 切换标签
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            if (tab === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
                // 更新注册表单的额外字段显示
                updateRegisterFields();
            }

            // 隐藏提示信息
            hideMessages();
        }

        // 更新注册表单字段
        function updateRegisterFields() {
            // 学生和教师注册字段相同，无需特殊处理
        }

        // 验证学号格式
        function validateStudentId(studentId) {
            // 必须是12位数字
            if (!/^\d{12}$/.test(studentId)) {
                return false;
            }
            // 提取专业代码
            const majorCode = studentId.substring(4, 8);
            // 验证专业代码
            const validMajorCodes = ['3501', '3502', '3503', '3515'];
            return validMajorCodes.includes(majorCode);
        }

        // 验证教师账号格式
        function validateTeacherId(teacherId) {
            // 6-20位字母或数字
            return /^[a-zA-Z0-9]{6,20}$/.test(teacherId);
        }

        // 显示错误信息
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        // 显示成功信息
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
            document.getElementById('errorMessage').classList.remove('show');
        }

        // 隐藏提示信息
        function hideMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        // 处理登录
        async function handleLogin(event) {
            event.preventDefault();
            hideMessages();

            const account = document.getElementById('loginAccount').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!account || !password) {
                showError('请输入账号和密码');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        role: currentRole,
                        account: account,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.code === 200) {
                    showSuccess('登录成功，正在跳转...');
                    // 跳转到对应的首页
                    setTimeout(() => {
                        if (currentRole === 'teacher') {
                            window.location.href = '/teacher/index';
                        } else {
                            window.location.href = '/student/index';
                        }
                    }, 1000);
                } else {
                    showError(data.msg || '登录失败');
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
                console.error('登录错误:', error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登录';
            }
        }

        // 处理注册
        async function handleRegister(event) {
            event.preventDefault();
            hideMessages();

            const account = document.getElementById('registerAccount').value.trim();
            const name = document.getElementById('registerName').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;

            // 验证账号
            if (!account) {
                showError('请输入账号');
                return;
            }

            // 根据角色验证账号格式
            if (currentRole === 'student') {
                if (!validateStudentId(account)) {
                    showError('学号格式错误！必须是12位数字，格式：202235150101（年级4位+专业4位+班级2位+编号2位），专业代码：3501/3502/3503/3515');
                    return;
                }
            } else {
                if (!validateTeacherId(account)) {
                    showError('教师账号格式错误！必须是6-20位字母或数字');
                    return;
                }
            }

            // 验证姓名
            if (!name) {
                showError('请输入姓名');
                return;
            }

            // 验证密码
            if (!password) {
                showError('请输入密码');
                return;
            }

            if (password.length < 6) {
                showError('密码长度至少6位');
                return;
            }

            // 验证确认密码
            if (!confirmPassword) {
                showError('请输入确认密码');
                return;
            }

            if (password !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        role: currentRole,
                        account: account,
                        name: name,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.code === 200) {
                    showSuccess('注册成功，请登录');
                    // 切换到登录标签
                    setTimeout(() => {
                        document.querySelector('.tab-btn').click();
                        document.getElementById('loginAccount').value = account;
                    }, 1500);
                } else {
                    showError(data.msg || '注册失败');
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
                console.error('注册错误:', error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> 注册';
            }
        }
    </script>
</body>
</html>
