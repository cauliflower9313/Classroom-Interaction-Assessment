<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人仪表盘 - 课堂互动系统</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        /* 仪表盘特定样式 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        
        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        .stat-card {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            padding: 20px;
            box-shadow: var(--box-shadow);
            transition: var(--transition);
            text-align: center;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--box-shadow-lg);
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin: 0 auto 12px;
        }
        
        .stat-icon.primary { background: rgba(74, 144, 217, 0.1); color: var(--primary-color); }
        .stat-icon.success { background: rgba(40, 167, 69, 0.1); color: var(--success-color); }
        .stat-icon.warning { background: rgba(255, 193, 7, 0.1); color: var(--warning-color); }
        .stat-icon.info { background: rgba(23, 162, 184, 0.1); color: var(--info-color); }
        .stat-icon.danger { background: rgba(220, 53, 69, 0.1); color: var(--danger-color); }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 13px;
            color: var(--gray-500);
        }
        
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }
        
        @media (max-width: 992px) {
            .chart-row {
                grid-template-columns: 1fr;
            }
        }
        
        .chart-box {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            padding: 20px;
            box-shadow: var(--box-shadow);
        }
        
        .chart-box h4 {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .chart-box h4 i {
            color: var(--primary-color);
        }
        
        .chart-container {
            height: 280px;
        }
        
        .no-data-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-500);
        }
        
        .no-data-message i {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--gray-400);
        }
        
        .tab-nav-inline {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            padding: 4px;
            background: var(--gray-100);
            border-radius: var(--border-radius);
        }
        
        .tab-btn-inline {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: var(--gray-600);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tab-btn-inline:hover {
            background: var(--white);
            color: var(--gray-800);
        }
        
        .tab-btn-inline.active {
            background: var(--white);
            color: var(--primary-color);
            box-shadow: var(--box-shadow);
        }
        
        .recommendation-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .recommendation-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
            background: var(--gray-100);
            border-radius: var(--border-radius);
            border-left: 3px solid var(--warning-color);
        }
        
        .recommendation-item i {
            color: var(--warning-color);
            font-size: 16px;
            margin-top: 2px;
        }
        
        .recommendation-text {
            flex: 1;
            font-size: 14px;
            color: var(--gray-700);
            line-height: 1.6;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--gray-500);
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--gray-400);
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-success { background: rgba(40, 167, 69, 0.1); color: var(--success-color); }
        .badge-danger { background: rgba(220, 53, 69, 0.1); color: var(--danger-color); }
        .badge-secondary { background: var(--gray-200); color: var(--gray-600); }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-graduation-cap"></i>
                    <span>课堂互动系统</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item" onclick="window.location.href='/student/index'">
                    <i class="fas fa-book"></i>
                    <span>我的课程</span>
                </div>
                <div class="nav-item active" onclick="window.location.href='/student/dashboard'">
                    <i class="fas fa-chart-pie"></i>
                    <span>个人仪表盘</span>
                </div>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部导航 -->
            <header class="top-header">
                <h1 class="header-title">个人仪表盘</h1>
                <div class="header-actions">
                    <div class="user-info">
                        <div class="user-avatar">{{ student_name[:1] }}</div>
                        <span class="user-name">{{ student_name }}</span>
                    </div>
                    <button class="btn btn-secondary btn-sm" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> 退出
                    </button>
                </div>
            </header>

            <!-- 内容区域 -->
            <div class="content-area">
                <!-- 页面标题 -->
                <div class="page-header">
                    <h2 class="page-title">我的学习数据</h2>
                    <p class="page-subtitle">查看课堂表现和学习记录</p>
                </div>

                <!-- 统计概览 - 参考教师端数据仪表盘 -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon primary"><i class="fas fa-book"></i></div>
                        <div class="stat-value" id="stat-total-courses">0</div>
                        <div class="stat-label">参与课程数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon info"><i class="fas fa-chart-line"></i></div>
                        <div class="stat-value" id="stat-avg-head-up">0%</div>
                        <div class="stat-label">平均抬头率</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon success"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-value" id="stat-avg-correct">0%</div>
                        <div class="stat-label">平均正确率</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon warning"><i class="fas fa-microphone"></i></div>
                        <div class="stat-value" id="stat-total-questions">0</div>
                        <div class="stat-label">累计识别提问数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon danger"><i class="fas fa-pencil-alt"></i></div>
                        <div class="stat-value" id="stat-total-answers">0</div>
                        <div class="stat-label">答题次数</div>
                    </div>
                </div>

                <!-- 图表区域 - 参考教师端 -->
                <div class="chart-row">
                    <div class="chart-box">
                        <h4><i class="fas fa-chart-line"></i> 抬头率趋势</h4>
                        <div class="chart-container">
                            <canvas id="headUpTrendChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-box">
                        <h4><i class="fas fa-chart-pie"></i> 答题正确率分布</h4>
                        <div class="chart-container">
                            <canvas id="answerAccuracyChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- 课程学习记录 - 整合我的记录功能 -->
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title"><i class="fas fa-list"></i> 课程学习记录</div>
                    </div>
                    <div class="panel-body" style="padding: 0;">
                        <div class="table-container">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>课程名称</th>
                                        <th>课堂时间</th>
                                        <th>抬头率</th>
                                        <th>答题情况</th>
                                        <th>正确率</th>
                                        <th>识别提问数</th>
                                    </tr>
                                </thead>
                                <tbody id="course-records-body">
                                    <tr><td colspan="6" class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>加载中...</p></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>


            </div>
        </main>
    </div>

    <script>
        // 全局数据存储
        let dashboardData = null;
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadDashboardData();
        });
        
        // 加载仪表盘数据
        function loadDashboardData() {
            fetch('/student/my_course_records', {
                method: 'GET',
                credentials: 'include'
            })
            .then(response => response.json())
            .then(result => {
                if (result.code === 200) {
                    dashboardData = result.data;
                    updateDashboard(dashboardData);
                } else {
                    console.error('获取数据失败:', result.msg);
                    showNoData();
                }
            })
            .catch(error => {
                console.error('加载数据失败:', error);
                showNoData();
            });
        }
        
        // 更新仪表盘显示
        function updateDashboard(data) {
            const stats = data.statistics || {};
            
            // 更新统计数据
            document.getElementById('stat-total-courses').textContent = stats.total_courses || 0;
            document.getElementById('stat-avg-head-up').textContent = (stats.avg_head_up_rate || 0).toFixed(1) + '%';
            document.getElementById('stat-avg-correct').textContent = (stats.avg_correct_rate || 0).toFixed(1) + '%';
            document.getElementById('stat-total-questions').textContent = stats.total_questions || 0;
            document.getElementById('stat-total-answers').textContent = stats.total_answers || 0;
            
            // 更新课程记录表格
            updateCourseRecords(data.course_records || []);
            
            // 绘制图表
            drawCharts(data);
        }
        
        // 更新课程记录表格
        function updateCourseRecords(records) {
            const tbody = document.getElementById('course-records-body');
            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><i class="fas fa-inbox"></i><p>暂无课程记录</p></td></tr>';
                return;
            }
            
            tbody.innerHTML = records.map(record => `
                <tr>
                    <td>${record.course_name}</td>
                    <td>${record.session_time}</td>
                    <td>${(record.head_up_rate || 0).toFixed(1)}%</td>
                    <td>${record.answered_questions || 0}/${record.total_questions || 0}</td>
                    <td>${(record.correct_rate || 0).toFixed(1)}%</td>
                    <td>${record.audio_question_count || 0}</td>
                </tr>
            `).join('');
        }
        
        // 绘制图表 - 参考教师端实现
        function drawCharts(data) {
            // 1. 抬头率趋势图
            const headUpCtx = document.getElementById('headUpTrendChart');
            if (headUpCtx && data.video_records && data.video_records.length > 0) {
                const ctx = headUpCtx.getContext('2d');
                const videoData = data.video_records.slice(-10); // 最近10条记录
                
                // 格式化横轴标签为日期（几月几日）
                const labels = videoData.map(v => {
                    const date = new Date(v.record_time);
                    return `${date.getMonth() + 1}月${date.getDate()}日`;
                });
                const values = videoData.map(v => v.head_up_rate || 0);
                
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '抬头率',
                            data: values,
                            borderColor: '#4a90d9',
                            backgroundColor: 'rgba(74, 144, 217, 0.1)',
                            tension: 0.4,
                            fill: true,
                            borderWidth: 2,
                            pointRadius: 4,
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return '抬头率: ' + context.parsed.y.toFixed(1) + '%';
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 100,
                                ticks: {
                                    stepSize: 20,
                                    callback: function(value) {
                                        return value;
                                    }
                                },
                                title: { display: true, text: '抬头率 (%)' }
                            },
                            x: {
                                title: { display: true, text: '日期' }
                            }
                        }
                    }
                });
            } else if (headUpCtx) {
                headUpCtx.parentElement.innerHTML = '<div class="no-data-message"><i class="fas fa-chart-line"></i><p>暂无抬头率数据</p></div>';
            }
            
            // 2. 答题正确率饼图
            const accuracyCtx = document.getElementById('answerAccuracyChart');
            if (accuracyCtx && data.answer_records && data.answer_records.length > 0) {
                const ctx = accuracyCtx.getContext('2d');
                const correctCount = data.answer_records.filter(a => a.is_correct).length;
                const wrongCount = data.answer_records.length - correctCount;
                
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['正确', '错误'],
                        datasets: [{
                            data: [correctCount, wrongCount],
                            backgroundColor: ['#28a745', '#dc3545'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom'
                            }
                        }
                    }
                });
            } else if (accuracyCtx) {
                accuracyCtx.parentElement.innerHTML = '<div class="no-data-message"><i class="fas fa-chart-pie"></i><p>暂无答题数据</p></div>';
            }
        }
        
        // 显示无数据状态
        function showNoData() {
            document.getElementById('course-records-body').innerHTML = '<tr><td colspan="6" class="empty-state"><i class="fas fa-inbox"></i><p>暂无数据</p></td></tr>';
        }
        
        // 退出登录
        function logout() {
            fetch("/student/logout", {
                method: "POST",
                credentials: "include"
            }).then(res => res.json()).then(data => {
                if (data.code === 200) window.location.href = "/student/login";
                else alert("退出失败：" + data.msg);
            }).catch(err => alert("网络错误：" + err.message));
        }
    </script>
</body>
</html>
